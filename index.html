<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos Pro - 安定同期版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Zen Kaku Gothic New', sans-serif; background-color: #f8fafc; color: #1e293b; user-select: none; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; min-height: calc(100vh - 120px); background: #f1f5f9; gap: 1px; border: 1px solid #e2e8f0; }
        .day-cell { min-height: 120px; background: white; transition: 0.2s; position: relative; overflow: hidden; padding-bottom: 24px; border: 2px solid transparent; }
        .day-cell:hover { background-color: #f8fafc; cursor: pointer; }
        .holiday-cell { border-color: #fecdd3 !important; background-color: #fff1f2 !important; }
        .holiday-date { color: #e11d48 !important; font-weight: 900 !important; }
        .event-bar { font-size: 0.65rem; padding: 2px 8px; margin-top: 2px; color: white; font-weight: 800; white-space: nowrap; overflow: hidden; height: 20px; display: flex; align-items: center; width: calc(100% + 2px); margin-left: -1px; }
        .event-dot-row { font-size: 0.65rem; padding: 1px 6px; margin-top: 1px; display: flex; align-items: center; font-weight: 700; color: #334155; border-radius: 4px; margin: 0 2px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; flex-shrink: 0; }
        .more-badge { position: absolute; bottom: 4px; right: 6px; font-size: 0.6rem; font-weight: 900; color: #64748b; background: #f1f5f9; padding: 1px 5px; border-radius: 4px; z-index: 10; }
        .active-nav { background-color: #eff6ff; color: #2563eb; font-weight: 900; }
        .hidden { display: none; }
        .picker-item { padding: 10px; cursor: pointer; font-weight: 700; border-radius: 8px; text-align: center; }
        .picker-selected { background: #3b82f6 !important; color: white !important; }
        #syncStatus { font-size: 10px; font-weight: 900; padding: 2px 8px; border-radius: 100px; display: inline-flex; align-items: center; gap: 4px; }
        .status-online { background: #dcfce7; color: #15803d; }
        .status-offline { background: #fee2e2; color: #b91c1c; }
        .status-none { background: #f1f5f9; color: #64748b; }
    </style>
</head>
<body class="flex h-screen overflow-hidden" onclick="hideContextMenu(); closeDayDetail();">

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col z-10 shadow-sm">
        <div class="p-6 pb-2">
            <h1 class="text-2xl font-black text-blue-600 mb-6 flex items-center gap-2 tracking-tighter"><i class="fas fa-calendar-check text-3xl"></i> Chronos</h1>
            <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95"><i class="fas fa-plus"></i> 予定を作成</button>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <button onclick="switchView('calendar')" id="nav-calendar" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 rounded-xl hover:bg-slate-50 active-nav font-bold transition-all"><i class="fas fa-calendar-alt"></i> カレンダー</button>
            <button onclick="switchView('dashboard')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3 text-slate-500 rounded-xl hover:bg-slate-50 font-bold transition-all"><i class="fas fa-th-large"></i> ダッシュボード</button>
            
            <!-- 同期ステータス表示 -->
            <button onclick="openSyncModal()" class="w-full flex flex-col gap-1 px-4 py-4 rounded-2xl hover:bg-slate-50 transition-all mt-4 border border-slate-100 text-left">
                <div class="flex items-center gap-3 font-black text-slate-700 text-sm">
                    <i class="fas fa-sync-alt"></i> 自動同期設定
                </div>
                <div id="syncStatus" class="status-none">
                    <i class="fas fa-circle text-[6px]"></i> 未接続
                </div>
            </button>
        </nav>
        
        <div class="p-4 m-4 bg-slate-50 rounded-2xl border flex gap-2">
            <button onclick="exportData()" class="flex-1 bg-white p-2 border rounded text-[9px] font-black hover:bg-slate-100 transition">書出し</button>
            <button onclick="document.getElementById('importFile').click()" class="flex-1 bg-white p-2 border rounded text-[9px] font-black hover:bg-slate-100 transition">取込み</button>
        </div>
        <input type="file" id="importFile" class="hidden" onchange="handleFileSelect(event)">
    </aside>

    <main class="flex-1 flex flex-col relative" id="mainContainer">
        <div id="syncOverlay" class="hidden absolute top-4 right-4 bg-white shadow-xl border border-slate-100 rounded-2xl px-4 py-2 z-[2000] flex items-center gap-3 animate-bounce">
            <div class="w-3 h-3 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <span class="text-[10px] font-black text-blue-600">SYNCING...</span>
        </div>

        <header class="h-16 border-b bg-white flex items-center justify-between px-8 relative">
            <button onclick="toggleDatePicker(); event.stopPropagation();" class="flex items-center gap-2 px-4 py-2 hover:bg-slate-50 rounded-xl">
                <h2 id="currentMonthDisplay" class="text-xl font-black text-slate-800 tracking-tight">2024年 10月</h2><i class="fas fa-chevron-down text-slate-300" id="pickerArrow"></i>
            </button>
            <div id="datePickerDropdown" class="hidden absolute top-16 left-8 bg-white shadow-2xl rounded-3xl border p-6 z-[100] w-[320px]">
                <div class="flex gap-4 h-64"><div id="yearPickerColumn" class="flex-1 overflow-y-auto pr-1"></div><div id="monthPickerColumn" class="w-24 overflow-y-auto pr-1"></div></div>
                <button onclick="toggleDatePicker()" class="mt-4 w-full py-2 bg-blue-600 text-white rounded-xl font-black text-xs shadow-md">決定</button>
            </div>
            <div class="flex bg-slate-100 rounded-xl p-1 shadow-inner"><button onclick="prevMonth()" class="p-2 hover:bg-white rounded-lg transition"><i class="fas fa-chevron-left text-xs"></i></button><button onclick="goToday()" class="px-4 text-xs font-black hover:bg-white rounded-lg transition">今日</button><button onclick="nextMonth()" class="p-2 hover:bg-white rounded-lg transition"><i class="fas fa-chevron-right text-xs"></i></button></div>
        </header>

        <div id="view-calendar" class="calendar-grid"></div>
        <div id="view-dashboard" class="hidden p-10 overflow-y-auto bg-slate-50 h-full"><div id="dashboard-list" class="space-y-4 max-w-4xl mx-auto"></div></div>

        <div id="dayDetailModal" class="hidden absolute bg-white shadow-2xl rounded-[1.5rem] border border-slate-100 z-[400] w-[260px] p-4">
            <div class="flex justify-between items-center mb-4 border-b pb-2"><div id="detailDateDisplay" class="font-black text-slate-800 text-sm">日付</div><button onclick="closeDayDetail()"><i class="fas fa-times text-xs text-slate-300"></i></button></div>
            <div id="detailList" class="space-y-2 max-h-[300px] overflow-y-auto"></div>
        </div>
    </main>

    <!-- 同期設定モーダル -->
    <div id="syncModal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center z-[3000]">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-[450px] p-10 text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6"><i class="fas fa-sync-alt text-2xl"></i></div>
            <h3 class="text-xl font-black mb-2 text-slate-800">スマホ・PC自動同期</h3>
            <p class="text-sm text-slate-400 font-bold mb-8">同期IDを設定すると、変更が即座に共有されます。</p>
            
            <div class="bg-slate-50 p-6 rounded-3xl border mb-8 text-left">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 px-1">現在の同期ID（合言葉）</p>
                <div class="flex gap-2">
                    <input id="syncIdInput" type="text" placeholder="英数字で自由に作成" class="flex-1 bg-white border-2 border-slate-200 rounded-xl px-4 py-3 font-black text-center text-blue-600 outline-none focus:border-blue-400">
                    <button onclick="generateNewSyncId()" class="bg-white border-2 border-slate-200 rounded-xl px-4 hover:border-blue-300 transition text-slate-400"><i class="fas fa-magic"></i></button>
                </div>
                <p class="text-[9px] text-slate-400 font-bold mt-3 px-1 leading-relaxed">
                    ※重要: セキュリティのため、このファイルを直接開くのではなく、Firefoxを使うか、公開されたURLから開くとうまくいく場合があります。
                </p>
            </div>

            <button onclick="enableAutoSync()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg transform active:scale-95 transition mb-3">自動同期を有効にする</button>
            <button onclick="closeSyncModal()" class="text-sm font-bold text-slate-300">閉じる</button>
        </div>
    </div>

    <!-- コンテキストメニュー -->
    <div id="contextMenu" class="hidden fixed z-[500] bg-white shadow-2xl rounded-xl border p-2 min-w-[150px]">
        <div class="menu-item p-2 hover:bg-blue-50 rounded cursor-pointer font-bold text-sm" onclick="initAction('copy')"><i class="fas fa-copy mr-2"></i> コピー</div>
        <div class="menu-item p-2 hover:bg-blue-50 rounded cursor-pointer font-bold text-sm" onclick="initAction('move')"><i class="fas fa-arrows-alt mr-2"></i> 移動</div>
        <div class="menu-item p-2 text-red-500 hover:bg-red-50 rounded cursor-pointer font-bold mt-1 border-t text-sm" onclick="deleteEventFromMenu()"><i class="fas fa-trash mr-2"></i> 削除</div>
    </div>

    <!-- 登録モーダル -->
    <div id="eventModal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center z-[600]">
        <div class="bg-white rounded-[2.5rem] shadow-2xl w-[540px] max-h-[94vh] flex flex-col overflow-hidden">
            <div class="p-8 overflow-y-auto">
                <input id="eventTitle" type="text" placeholder="タイトル" class="text-2xl font-black outline-none w-full border-b-2 border-transparent focus:border-blue-400 pb-1 mb-8">
                <div class="space-y-4 text-left">
                    <div class="bg-slate-50 p-5 rounded-2xl border">
                        <div class="flex items-center justify-between mb-4"><span class="text-xs font-black text-slate-400 uppercase tracking-widest">期間・時間</span><label class="flex items-center gap-2 cursor-pointer bg-white px-3 py-1 rounded-full"><input type="checkbox" id="isAllDay" onchange="toggleTimeInputs()" checked class="rounded text-blue-500"><span class="text-[10px] font-black">終日</span></label></div>
                        <div class="flex gap-2 mb-3"><input id="startDate" type="date" class="w-full p-2 border rounded-xl font-bold"><input id="endDate" type="date" class="w-full p-2 border rounded-xl font-bold"></div>
                        <div id="timeInputs" class="hidden flex gap-2"><input id="startTime" type="time" class="w-full p-2 border rounded-xl font-bold"><span class="text-slate-300">~</span><input id="endTime" type="time" class="w-full p-2 border rounded-xl font-bold"></div>
                    </div>
                    <select id="eventRepeat" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none"><option value="none">繰り返さない</option><option value="daily">毎日</option><option value="weekly">毎週</option><option value="monthly">毎月</option></select>
                    <select id="eventColor" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                        <option value="#3b82f6">ブルー</option><option value="#ef4444">レッド</option><option value="#10b981">エメラルド</option><option value="#f59e0b">アンバー</option><option value="#8b5cf6">パープル</option>
                    </select>
                    <textarea id="eventNote" placeholder="詳細メモ..." class="w-full bg-slate-50 p-4 rounded-2xl min-h-[100px] font-bold outline-none resize-none"></textarea>
                </div>
            </div>
            <div class="p-8 bg-slate-50/50 flex justify-end gap-3"><button onclick="closeModal()" class="font-bold text-slate-400">戻る</button><button onclick="saveEvent()" class="px-10 py-3 bg-blue-600 text-white rounded-2xl font-black shadow-lg">保存</button></div>
            <input type="hidden" id="editingId">
        </div>
    </div>

    <script>
        /* --- 1. システム設定 --- */
        let currentMonth = new Date();
        const STORAGE_KEY = 'chronos_autosync_v4_kvdb';
        const SYNC_ID_KEY = 'chronos_active_sync_id_kvdb';
        let eventsList = [];
        let holidays = {};
        let longPressTimer, isLongPressActive = false, selectedEventId = null, activeAction = null, actionSourceEvent = null;

        /* --- 2. 安定型同期エンジン (KVDB使用) --- */
        const KVDB_SECRET = "chronos_app_public_v1"; // 共有バケット識別子

        async function apiKV(method, syncId, data = null) {
            const url = `https://kvdb.io/${KVDB_SECRET}/${syncId}`;
            const options = {
                method: method,
                headers: { "Content-Type": "text/plain" } // プレーンテキストで送ることでCORS回避
            };
            if(data) options.body = JSON.stringify(data);
            
            const res = await fetch(url, options);
            if (!res.ok) throw new Error("Connection failed");
            if (method === 'GET') return res.json();
            return true;
        }

        async function triggerAutoSync() {
            const syncId = localStorage.getItem(SYNC_ID_KEY);
            if(!syncId) return;
            document.getElementById('syncOverlay').classList.remove('hidden');
            try {
                await apiKV('POST', syncId, eventsList);
                updateSyncStatusUI('online');
            } catch(e) { 
                console.error("Sync Error", e);
                updateSyncStatusUI('offline');
            }
            setTimeout(() => document.getElementById('syncOverlay').classList.add('hidden'), 800);
        }

        async function initialLoadSync() {
            const syncId = localStorage.getItem(SYNC_ID_KEY);
            if(!syncId) return;
            updateSyncStatusUI('online');
            try {
                const cloudData = await apiKV('GET', syncId);
                if(Array.isArray(cloudData)) {
                    const ids = new Set(eventsList.map(e => e.id));
                    cloudData.forEach(n => { if(!ids.has(n.id)) eventsList.push(n); });
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(eventsList));
                    renderCalendar();
                }
            } catch(e) { updateSyncStatusUI('offline'); }
        }

        async function enableAutoSync() {
            const syncId = document.getElementById('syncIdInput').value.trim();
            if(!syncId) return alert("同期IDを入力してください。");
            document.getElementById('syncOverlay').classList.remove('hidden');
            try {
                // 通信テスト
                await apiKV('POST', syncId, eventsList);
                localStorage.setItem(SYNC_ID_KEY, syncId);
                await initialLoadSync();
                alert("同期に成功しました！");
                closeSyncModal();
            } catch(e) { 
                alert("接続に失敗しました。\nブラウザのセキュリティ設定により制限されている可能性があります。Firefoxなどの別のブラウザで試すか、サーバー経由で開いてください。"); 
            }
            document.getElementById('syncOverlay').classList.add('hidden');
        }

        function updateSyncStatusUI(type) {
            const el = document.getElementById('syncStatus');
            if(type === 'online') {
                el.className = "status-online";
                el.innerHTML = `<i class="fas fa-circle text-[6px]"></i> 同期中 (${localStorage.getItem(SYNC_ID_KEY)})`;
            } else if(type === 'offline') {
                el.className = "status-offline";
                el.innerHTML = `<i class="fas fa-exclamation-circle text-[6px]"></i> 通信エラー`;
            }
        }

        function generateNewSyncId() {
            document.getElementById('syncIdInput').value = Math.random().toString(36).substring(2, 10).toUpperCase();
        }

        /* --- 3. 予定操作・UI描画 (前回機能踏襲) --- */
        function migrateOldData() {
            const keys = ['chronos_events', 'chronos_v16_ultimate', 'chronos_ultimate_final_sync', 'chronos_sync_engine_final', 'chronos_sync_v2_final'];
            let combined = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const ids = new Set(combined.map(e => e.id));
            keys.forEach(k => { const d = localStorage.getItem(k); if(!d) return; try { JSON.parse(d).forEach(e => { if(!ids.has(e.id)){ combined.push(e); ids.add(e.id); } }); } catch(e){} });
            eventsList = combined; localStorage.setItem(STORAGE_KEY, JSON.stringify(eventsList));
        }

        async function fetchHolidays() {
            try { const res = await fetch('https://holidays-jp.github.io/api/v1/date.json'); const all = await res.json();
                holidays = {}; const cy = new Date().getFullYear(); for(let d in all) if(parseInt(d.split('-')[0]) <= cy + 5) holidays[d] = all[d];
            } catch(e){}
            renderCalendar();
        }

        function renderCalendar() {
            const container = document.getElementById('view-calendar'); container.innerHTML = '';
            const year = currentMonth.getFullYear(); const month = currentMonth.getMonth();
            document.getElementById('currentMonthDisplay').innerText = `${year}年 ${month + 1}月`;
            ['日','月','火','水','木','金','土'].forEach(d => {
                const color = d === '日' ? 'text-red-400' : (d === '土' ? 'text-blue-400' : 'text-slate-400');
                container.innerHTML += `<div class="bg-slate-50 text-[10px] font-black ${color} text-center py-3 border-b border-slate-200 uppercase">${d}</div>`;
            });
            const first = new Date(year, month, 1).getDay(); const last = new Date(year, month + 1, 0).getDate();
            for(let i=0; i<first; i++) container.innerHTML += `<div class="day-cell bg-slate-50/40"></div>`;
            for(let d=1; d<=last; d++) {
                const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const check = new Date(dateStr); const holiday = holidays[dateStr];
                const dayEvs = eventsList.filter(ev => {
                    const s = new Date(ev.startDate); const e = new Date(ev.endDate);
                    if(check >= s && check <= e) return true;
                    if(ev.repeat === 'daily' && check >= s) return true;
                    if(ev.repeat === 'weekly' && check >= s && check.getDay() === s.getDay()) return true;
                    if(ev.repeat === 'monthly' && check >= s && check.getDate() === s.getDate()) return true;
                    return false;
                }).sort((a,b) => (a.isAllDay ? -1 : 1) || (a.startTime > b.startTime ? 1 : -1));
                const visible = dayEvs.slice(0, 4); const more = dayEvs.length - 4;
                let html = `<div class="flex justify-between p-1">
                    <div onclick="event.stopPropagation(); openDayDetail(event, '${dateStr}')" class="text-[12px] px-2 py-1 cursor-pointer rounded-lg ${new Date().toDateString()===check.toDateString()?'bg-blue-600 text-white font-black':(holiday?'holiday-date':'text-slate-400 font-bold')}">${d}</div>
                    ${holiday ? `<span class="holiday-name truncate text-[8px] font-black text-red-300 max-w-[60px]">${holiday}</span>` : ''}</div>`;
                visible.forEach(ev => {
                    if(ev.startDate !== ev.endDate || ev.isAllDay) html += `<div class="event-bar ${dateStr===ev.startDate?'rounded-l-lg':''}" style="background:${ev.color}" onmousedown="onEventMouseDown(event,'${ev.id}')" onclick="onEventClick(event,'${ev.id}')"><span class="truncate">${ev.title || '無題'}</span></div>`;
                    else html += `<div class="event-dot-row" onmousedown="onEventMouseDown(event,'${ev.id}')" onclick="onEventClick(event,'${ev.id}')"><span class="dot" style="background:${ev.color}"></span><span class="truncate">${ev.title || '無題'}</span></div>`;
                });
                if(more > 0) html += `<div class="more-badge" onclick="event.stopPropagation(); openDayDetail(event, '${dateStr}')">+${more}件</div>`;
                const cell = document.createElement('div'); cell.className = `day-cell ${holiday?'holiday-cell':''}`; cell.innerHTML = html;
                cell.onclick = () => handleCellClick(dateStr); container.appendChild(cell);
            }
        }

        /* 補助関数 (長押し、ピッカー、モーダル等) */
        function toggleTimeInputs() { document.getElementById('timeInputs').classList.toggle('hidden', document.getElementById('isAllDay').checked); }
        function onEventMouseDown(e, id) { isLongPressActive = false; selectedEventId = id; longPressTimer = setTimeout(() => { isLongPressActive = true; showContextMenu(e.clientX, e.clientY); }, 500); }
        function onEventClick(e, id) { e.stopPropagation(); clearTimeout(longPressTimer); if(!isLongPressActive) openModal('', id); }
        function closeModal() { document.getElementById('eventModal').classList.add('hidden'); }
        function saveEvent() {
            const id = document.getElementById('editingId').value || Date.now().toString();
            const n = { id, title: document.getElementById('eventTitle').value, startDate: document.getElementById('startDate').value, endDate: document.getElementById('endDate').value, isAllDay: document.getElementById('isAllDay').checked, startTime: document.getElementById('startTime').value, endTime: document.getElementById('endTime').value, color: document.getElementById('eventColor').value, repeat: document.getElementById('eventRepeat').value, note: document.getElementById('eventNote').value };
            eventsList = eventsList.filter(x => x.id != id); eventsList.push(n);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(eventsList)); 
            closeModal(); renderCalendar(); triggerAutoSync();
        }
        function openModal(dateKey = '', id = null) {
            document.getElementById('eventModal').classList.remove('hidden');
            if(id) { const ev = eventsList.find(x => x.id == id); document.getElementById('editingId').value = id; document.getElementById('eventTitle').value = ev.title; document.getElementById('startDate').value = ev.startDate; document.getElementById('endDate').value = ev.endDate; document.getElementById('isAllDay').checked = ev.isAllDay; document.getElementById('eventNote').value = ev.note; document.getElementById('eventColor').value = ev.color; }
            else { document.getElementById('editingId').value = ''; document.getElementById('eventTitle').value = ''; document.getElementById('startDate').value = dateKey; document.getElementById('endDate').value = dateKey; document.getElementById('isAllDay').checked = true; }
            toggleTimeInputs();
        }
        function hideContextMenu() { document.getElementById('contextMenu').classList.add('hidden'); }
        function showContextMenu(x, y) { const m = document.getElementById('contextMenu'); m.style.left = `${x}px`; m.style.top = `${y}px`; m.classList.remove('hidden'); }
        function deleteEventFromMenu() { eventsList = eventsList.filter(ev => ev.id !== selectedEventId); localStorage.setItem(STORAGE_KEY, JSON.stringify(eventsList)); renderCalendar(); hideContextMenu(); triggerAutoSync(); }
        function openSyncModal() { document.getElementById('syncModal').classList.remove('hidden'); document.getElementById('syncIdInput').value = localStorage.getItem(SYNC_ID_KEY) || ''; }
        function closeSyncModal() { document.getElementById('syncModal').classList.add('hidden'); }
        function prevMonth() { currentMonth.setMonth(currentMonth.getMonth()-1); renderCalendar(); }
        function nextMonth() { currentMonth.setMonth(currentMonth.getMonth()+1); renderCalendar(); }
        function goToday() { currentMonth = new Date(); renderCalendar(); }
        function handleCellClick(d) { if(!activeAction) openModal(d); }
        function switchView(v) { document.getElementById('view-calendar').classList.toggle('hidden', v==='dashboard'); document.getElementById('view-dashboard').classList.toggle('hidden', v==='calendar'); }
        function toggleDatePicker() { document.getElementById('datePickerDropdown').classList.toggle('hidden'); if(!document.getElementById('datePickerDropdown').classList.contains('hidden')) initPickerLists(); }
        function initPickerLists() {
            const yc = document.getElementById('yearPickerColumn'); const mc = document.getElementById('monthPickerColumn');
            const cy = currentMonth.getFullYear(); yc.innerHTML = ''; mc.innerHTML = '';
            for (let y = cy - 50; y <= cy + 50; y++) {
                const i = document.createElement('div'); i.className = `picker-item ${y === cy ? 'picker-selected' : ''}`; i.innerText = `${y}年`;
                i.onclick = (e) => { e.stopPropagation(); currentMonth.setFullYear(y); renderCalendar(); initPickerLists(); }; yc.appendChild(i);
                if(y === cy) setTimeout(() => i.scrollIntoView({ block: 'center' }), 0);
            }
            for (let m = 0; m < 12; m++) {
                const i = document.createElement('div'); i.className = `picker-item ${m === currentMonth.getMonth() ? 'picker-selected' : ''}`; i.innerText = `${m + 1}月`;
                i.onclick = (e) => { e.stopPropagation(); currentMonth.setMonth(m); renderCalendar(); initPickerLists(); }; mc.appendChild(i);
                if(m === currentMonth.getMonth()) setTimeout(() => i.scrollIntoView({ block: 'center' }), 0);
            }
        }
        function openDayDetail(e, dateStr) {
            const m = document.getElementById('dayDetailModal'); const l = document.getElementById('detailList');
            const dayEvents = eventsList.filter(ev => { const s = new Date(ev.startDate); const end = new Date(ev.endDate); const chk = new Date(dateStr);
                if(chk >= s && chk <= end) return true;
                if(ev.repeat === 'daily' && chk >= s) return true;
                if(ev.repeat === 'weekly' && chk >= s && chk.getDay() === s.getDay()) return true;
                if(ev.repeat === 'monthly' && chk >= s && chk.getDate() === s.getDate()) return true;
                return false;
            });
            if(dayEvents.length === 0) { openModal(dateStr); return; }
            document.getElementById('detailDateDisplay').innerText = dateStr; l.innerHTML = '';
            dayEvents.forEach(ev => {
                const i = document.createElement('div'); i.className = 'flex items-center gap-3 p-2 hover:bg-slate-50 rounded-xl cursor-pointer';
                i.onmousedown = (e) => onEventMouseDown(e, ev.id); i.onmouseup = onEventMouseUp; i.onclick = (e) => onEventClick(e, ev.id, dateStr);
                i.innerHTML = `<span class="dot" style="background:${ev.color}"></span><span class="text-xs font-bold text-slate-700 truncate">${ev.title || '(無題)'}</span>`;
                l.appendChild(i);
            });
            const rect = e.currentTarget.closest('.day-cell').getBoundingClientRect();
            m.style.left = `${Math.min(rect.left, window.innerWidth - 280)}px`; m.style.top = `${Math.min(rect.top, window.innerHeight - 320)}px`;
            m.classList.remove('hidden'); e.stopPropagation();
        }
        function closeDayDetail() { document.getElementById('dayDetailModal').classList.add('hidden'); }
        function exportData() { const b = new Blob([JSON.stringify(eventsList, null, 2)], { type: "application/json" }); const l = document.createElement("a"); l.href = URL.createObjectURL(b); l.download = `chronos_backup.json`; l.click(); }

        // 起動処理
        migrateOldData();
        fetchHolidays();
        initialLoadSync();
    </script>
</body>
</html>
